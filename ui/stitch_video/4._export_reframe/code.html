<!DOCTYPE html>

<html class="dark" lang="en"><head>

<style>
        .glass-effect {
            background: rgba(38, 38, 38, 0.6);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body min-h-screen">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 h-16 bg-[#0e0e0e]/80 backdrop-blur-xl bg-gradient-to-b from-[#131313] to-transparent">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-[#b6a0ff]">menu</span>
<h1 class="text-xl font-black text-[#b6a0ff] uppercase tracking-widest font-headline">PremiereAI</h1>
</div>
<button class="text-[#b6a0ff] font-headline font-bold tracking-tight hover:text-[#00e3fd] transition-colors">Export</button>
</header>
<main class="pt-24 pb-32 px-6 max-w-lg mx-auto flex flex-col gap-8">
<!-- Preview Player -->
<section class="relative aspect-video w-full rounded-xl overflow-hidden shadow-2xl surface-container-low">
<img alt="Cinematic landscape video preview" class="w-full h-full object-cover" data-alt="cinematic close-up of a high-end camera lens capturing a sunset over a neon city, rich purples and cyans, anamorphic flare" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD0Mn-7zgCr6hS3vTIteY5EwCK5zImlbjHO2-TwrAWKkm19AuXNitcXTBatKCzW71lyN1wCmXRoeK5WBDf50-XGzFUzALxI8nAzOQeK-Yw-4Q4dRF7rfkSo0FRJs2ss7QZU9I-5aDjgPBnY-FP5iAHWtA3DB4PJo3CWjUeHjTg-GbI0gsQI2jD2h6Lsr8SobPoVOJ8gWPza7YhH14iRtOb20KgvzK4Zy0Ak7zOo-tjXPFOXgJy04Un1QfDjh_a2JxGmtn5-7nLPcQUo"/>
<div class="absolute inset-0 flex items-center justify-center bg-black/40">
<div class="w-12 h-12 rounded-full glass-effect flex items-center justify-center border border-white/10">
<span class="material-symbols-outlined text-white">play_arrow</span>
</div>
</div>
<div class="absolute bottom-3 left-3 bg-black/60 backdrop-blur-md px-3 py-1 rounded-full text-[10px] font-bold tracking-widest uppercase border border-white/10">
                Final Master • 0:45
            </div>
</section>
<!-- Progress Indicator -->
<section class="flex flex-col gap-3">
<div class="flex justify-between items-end">
<div>
<h3 class="text-on-surface-variant text-xs font-bold uppercase tracking-widest mb-1">Current Task</h3>
<p class="text-on-surface font-headline font-bold">Preparing for TikTok...</p>
</div>
<span class="text-primary font-headline font-extrabold text-lg">85%</span>
</div>
<div class="h-1.5 w-full bg-surface-container-highest rounded-full overflow-hidden">
<div class="h-full bg-gradient-to-r from-primary to-secondary w-[85%] rounded-full shadow-[0_0_12px_rgba(182,160,255,0.5)]"></div>
</div>
</section>
<!-- Auto-Reframe Section -->
<section>
<div class="flex items-center justify-between mb-6">
<h2 class="font-headline text-lg font-bold">Auto-Reframe</h2>
<span class="text-[10px] bg-secondary/10 text-secondary px-2 py-0.5 rounded border border-secondary/20 font-bold uppercase">AI Powered</span>
</div>
<div class="grid grid-cols-3 gap-3">
<!-- TikTok -->
<button class="flex flex-col items-center gap-3 p-4 rounded-xl border border-primary/40 bg-primary/5 group transition-all">
<div class="w-10 h-12 border-2 border-primary rounded-md flex items-center justify-center relative overflow-hidden">
<span class="material-symbols-outlined text-primary text-sm">movie_edit</span>
<div class="absolute inset-x-0 bottom-0 h-1/2 bg-primary/20"></div>
</div>
<div class="text-center">
<p class="text-[10px] font-bold text-on-surface">TikTok</p>
<p class="text-[9px] text-on-surface-variant italic">9:16</p>
</div>
</button>
<!-- YouTube -->
<button class="flex flex-col items-center gap-3 p-4 rounded-xl border border-transparent bg-surface-container-low hover:bg-surface-container-high transition-all">
<div class="w-14 h-10 border border-on-surface-variant/30 rounded-md flex items-center justify-center">
<span class="material-symbols-outlined text-on-surface-variant text-sm">tv</span>
</div>
<div class="text-center">
<p class="text-[10px] font-bold text-on-surface-variant">YouTube</p>
<p class="text-[9px] text-on-surface-variant italic">16:9</p>
</div>
</button>
<!-- Instagram -->
<button class="flex flex-col items-center gap-3 p-4 rounded-xl border border-transparent bg-surface-container-low hover:bg-surface-container-high transition-all">
<div class="w-10 h-10 border border-on-surface-variant/30 rounded-md flex items-center justify-center">
<span class="material-symbols-outlined text-on-surface-variant text-sm">square</span>
</div>
<div class="text-center">
<p class="text-[10px] font-bold text-on-surface-variant">Instagram</p>
<p class="text-[9px] text-on-surface-variant italic">1:1</p>
</div>
</button>
</div>
</section>
<!-- Export Settings Card (Bento Style) -->
<section class="grid grid-cols-2 gap-4">
<div class="col-span-2 glass-effect rounded-2xl p-5 border border-white/5 flex items-center justify-between">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-full bg-surface-container-highest flex items-center justify-center">
<span class="material-symbols-outlined text-secondary">hd</span>
</div>
<div>
<p class="text-xs font-bold text-on-surface">Resolution</p>
<p class="text-[10px] text-on-surface-variant">4K Ultra HD (2160p)</p>
</div>
</div>
<span class="material-symbols-outlined text-on-surface-variant">expand_more</span>
</div>
<div class="surface-container-low rounded-2xl p-4 flex flex-col gap-2">
<p class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant">Framerate</p>
<p class="text-sm font-bold">60 FPS</p>
</div>
<div class="surface-container-low rounded-2xl p-4 flex flex-col gap-2">
<p class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant">Bitrate</p>
<p class="text-sm font-bold">High (30 Mbps)</p>
</div>
</section>
<!-- Main Action -->
<div class="mt-4">
<button class="w-full h-16 bg-gradient-to-br from-[#b6a0ff] to-[#7e51ff] rounded-2xl shadow-[0_8px_32px_rgba(126,81,255,0.3)] flex items-center justify-center gap-3 active:scale-95 transition-all">
<span class="material-symbols-outlined text-white" style="font-variation-settings: 'FILL' 1;">file_upload</span>
<span class="font-headline font-extrabold text-white tracking-wide">Export &amp; Share</span>
</button>
<p class="text-center text-[10px] text-on-surface-variant mt-4 font-medium italic">Estimated file size: 142.4 MB</p>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-8 pb-8">
<div class="w-full flex justify-around items-center bg-[#262626]/60 backdrop-blur-[24px] rounded-t-[1.5rem] mx-4 mb-6 border border-white/10 shadow-[0_20px_40px_rgba(0,0,0,0.15)] py-2">
<div class="flex flex-col items-center justify-center text-[#adaaaa] p-3 hover:bg-white/5 transition-all active:scale-95 duration-200">
<span class="material-symbols-outlined">movie_edit</span>
</div>
<div class="flex flex-col items-center justify-center text-[#adaaaa] p-3 hover:bg-white/5 transition-all active:scale-95 duration-200">
<span class="material-symbols-outlined">auto_awesome</span>
</div>
<div class="flex flex-col items-center justify-center bg-gradient-to-br from-[#b6a0ff] to-[#7e51ff] text-white rounded-xl p-3 active:scale-95 duration-200">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">layers</span>
</div>
<div class="flex flex-col items-center justify-center text-[#adaaaa] p-3 hover:bg-white/5 transition-all active:scale-95 duration-200">
<span class="material-symbols-outlined">settings</span>
</div>
</div>
</nav>
</body></html>
