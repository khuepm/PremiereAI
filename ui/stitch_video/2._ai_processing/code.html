<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .processing-glow {
        background: radial-gradient(circle at center, rgba(182, 160, 255, 0.15) 0%, transparent 70%);
      }
      /* Custom wave animation simulation using steps for UI feel */
      .wave-bar {
        transition: height 0.3s ease;
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body selection:bg-primary/30">
<!-- Top Navigation (Shell suppressed for focus, but using TopAppBar logic for Brand Identity) -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 h-16 bg-gradient-to-b from-[#131313] to-transparent">
<div class="text-xl font-headline font-black text-primary uppercase tracking-widest">
            PremiereAI
        </div>
<div class="flex gap-4">
<button class="p-2 text-on-surface-variant hover:text-secondary transition-colors">
<span class="material-symbols-outlined">help_outline</span>
</button>
</div>
</header>
<!-- Main Processing Canvas -->
<main class="relative min-h-screen flex flex-col items-center justify-center px-6 pt-16 pb-32">
<!-- Ambient Background Effect -->
<div class="absolute inset-0 overflow-hidden pointer-events-none">
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] processing-glow rounded-full blur-[80px]"></div>
</div>
<!-- Center Stage: The AI "Heartbeat" -->
<div class="relative z-10 flex flex-col items-center max-w-md w-full">
<!-- Circular Progress / Waveform Hybrid Container -->
<div class="relative w-64 h-64 flex items-center justify-center mb-12">
<!-- Outer Glow Ring -->
<div class="absolute inset-0 rounded-full border border-primary/10 scale-110"></div>
<!-- Rotating AI Ring (Simulated) -->
<div class="absolute inset-0 rounded-full border-2 border-transparent border-t-primary border-r-primary/30 animate-spin transition-all duration-[3000ms]"></div>
<!-- Inner Waveform Core -->
<div class="flex items-end justify-center gap-1.5 h-24">
<div class="wave-bar w-1.5 h-12 bg-primary-dim rounded-full"></div>
<div class="wave-bar w-1.5 h-20 bg-primary rounded-full"></div>
<div class="wave-bar w-1.5 h-16 bg-primary-fixed-dim rounded-full"></div>
<div class="wave-bar w-1.5 h-24 bg-secondary rounded-full shadow-[0_0_15px_rgba(0,227,253,0.5)]"></div>
<div class="wave-bar w-1.5 h-18 bg-primary rounded-full"></div>
<div class="wave-bar w-1.5 h-14 bg-primary-dim rounded-full"></div>
<div class="wave-bar w-1.5 h-8 bg-primary/40 rounded-full"></div>
</div>
</div>
<!-- Status Messaging -->
<div class="text-center space-y-4">
<h1 class="font-headline text-2xl font-bold tracking-tight text-on-surface">
                    AI is analyzing 12 clips...
                </h1>
<p class="text-on-surface-variant text-sm font-medium leading-relaxed max-w-xs mx-auto">
                    Identifying best moments &amp; syncing to beat. This usually takes less than a minute.
                </p>
</div>
<!-- Analysis Detail Grid (Bento Style Lite) -->
<div class="mt-12 grid grid-cols-2 gap-3 w-full">
<div class="bg-surface-container-low p-4 rounded-xl border border-outline-variant/10 flex items-center gap-3">
<div class="w-8 h-8 rounded-lg bg-primary/10 flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-lg" style="font-variation-settings: 'FILL' 1;">face</span>
</div>
<div class="flex flex-col">
<span class="text-[10px] uppercase tracking-wider text-on-surface-variant font-bold">Face Track</span>
<span class="text-xs font-semibold text-secondary">Active</span>
</div>
</div>
<div class="bg-surface-container-low p-4 rounded-xl border border-outline-variant/10 flex items-center gap-3">
<div class="w-8 h-8 rounded-lg bg-tertiary/10 flex items-center justify-center text-tertiary">
<span class="material-symbols-outlined text-lg" style="font-variation-settings: 'FILL' 1;">music_note</span>
</div>
<div class="flex flex-col">
<span class="text-[10px] uppercase tracking-wider text-on-surface-variant font-bold">Beat Sync</span>
<span class="text-xs font-semibold text-tertiary">Calculating</span>
</div>
</div>
</div>
</div>
</main>
<!-- Bottom Action (Suppressed Shell, Task-Focused Cancel) -->
<footer class="fixed bottom-0 left-0 w-full z-50 flex justify-center items-center px-8 pb-12">
<button class="px-8 py-4 bg-surface-variant/60 backdrop-blur-xl border border-outline-variant/15 text-on-surface-variant font-label font-semibold rounded-full hover:bg-surface-bright hover:text-on-surface transition-all active:scale-95">
            Cancel Processing
        </button>
</footer>
<!-- Image Prompts (Decorative/Contextual) -->

</div>
