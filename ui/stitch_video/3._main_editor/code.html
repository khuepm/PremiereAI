<body class="bg-background text-on-surface font-body selection:bg-primary/30">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 h-16 bg-[#0e0e0e]/80 backdrop-blur-xl bg-gradient-to-b from-[#131313] to-transparent">

<button class="text-[#adaaaa] hover:text-[#00e3fd] transition-colors">

</button>
<span class="text-xl font-black text-[#b6a0ff] uppercase tracking-widest font-headline">PremiereAI</span>
</div>
<div class="flex items-center gap-6">
<button class="text-[#adaaaa] hover:text-[#00e3fd] transition-colors font-headline font-bold tracking-tight">Export</button>
</div>
</header>
<main class="pt-16 pb-32 min-h-screen flex flex-col">

<div class="absolute inset-0 bg-gradient-to-t from-black/40 via-transparent to-transparent"></div>

<div class="absolute inset-0 flex items-center justify-center">
<button class="w-20 h-20 rounded-full bg-white/10 backdrop-blur-md border border-white/20 flex items-center justify-center text-white hover:scale-110 active:scale-95 transition-all">
<span class="material-symbols-outlined !text-5xl" data-icon="play_arrow" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
</button>
</div>
<!-- Preview Info Tag -->
<div class="absolute top-6 left-6 flex items-center gap-2 bg-black/40 backdrop-blur-xl px-4 py-2 rounded-full border border-white/10">
<div class="w-2 h-2 rounded-full bg-error"></div>
<span class="text-[10px] font-bold tracking-widest uppercase opacity-80">4K Render Preview</span>
</div>
</div>
</section>
<!-- Sidebar Actions (Layers/Media) -->
<div class="fixed right-6 top-1/2 -translate-y-1/2 flex flex-col gap-4 z-40">
<button class="w-12 h-12 rounded-2xl bg-surface-container-high/60 backdrop-blur-xl border border-white/5 flex items-center justify-center text-on-surface-variant hover:text-primary hover:bg-surface-bright transition-all">
<span class="material-symbols-outlined" data-icon="layers">layers</span>
</button>
<button class="w-12 h-12 rounded-2xl bg-surface-container-high/60 backdrop-blur-xl border border-white/5 flex items-center justify-center text-on-surface-variant hover:text-primary hover:bg-surface-bright transition-all">
<span class="material-symbols-outlined" data-icon="video_library">video_library</span>
</button>
</div>
<!-- Smart Timeline -->
<section class="mt-auto px-4 md:px-8 mb-8">
<div class="flex items-center justify-between mb-4">
<h3 class="font-headline font-bold text-on-surface-variant flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-sm" data-icon="auto_awesome" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
                    Smart Timeline
                </h3>
<span class="text-xs font-mono text-on-surface-variant bg-surface-container-low px-2 py-1 rounded">00:12:45:08</span>
</div>
<div class="flex gap-1 overflow-x-auto no-scrollbar pb-4 -mx-4 px-4 md:mx-0 md:px-0">

</div>
<span class="text-[10px] font-medium text-on-surface-variant uppercase tracking-wider px-1">Scene 1</span>
</div>
<!-- Scene 2 (Active/Selected) -->
<div class="flex-shrink-0 w-64 group cursor-pointer">
<div class="h-24 rounded-xl bg-primary-dim/20 overflow-hidden border-2 border-primary transition-all mb-2 relative">

<div class="absolute inset-0 bg-primary/10"></div>
<div class="absolute bottom-2 right-2 bg-primary px-1.5 py-0.5 rounded text-[10px] font-bold text-on-primary">5.1s</div>
</div>
<span class="text-[10px] font-bold text-primary uppercase tracking-wider px-1 flex items-center gap-1">
                        Scene 2
                        <span class="w-1 h-1 rounded-full bg-primary"></span>
                        Active
                    </span>
</div>
<!-- Scene 3 -->
<div class="flex-shrink-0 w-40 group cursor-pointer">
<div class="h-24 rounded-xl bg-surface-container-low overflow-hidden border border-white/5 group-hover:border-primary/50 transition-all mb-2 relative">

<div class="absolute bottom-2 right-2 bg-black/60 backdrop-blur px-1.5 py-0.5 rounded text-[10px] font-bold">2.8s</div>
</div>
<span class="text-[10px] font-medium text-on-surface-variant uppercase tracking-wider px-1">Scene 3</span>
</div>
<!-- Scene 4 -->
<div class="flex-shrink-0 w-52 group cursor-pointer">
<div class="h-24 rounded-xl bg-surface-container-low overflow-hidden border border-white/5 group-hover:border-primary/50 transition-all mb-2 relative">
<img alt="River thumbnail" class="w-full h-full object-cover opacity-60 group-hover:opacity-100 transition-opacity" data-alt="winding river through a valley with soft afternoon sun, cinematic landscape photography" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBkTIRPx5tAPxF0os_Mggzm0Jm8uu71PrwETrLb6gHAvHZY8twK_2_IgMxfpTdvVukZbOwLpp3s2Yj3IjKtzDoHyKzTnpXWKiBeMnkKqsgCjbk2CwyC-wXvI5XPtuw1jgB0JZOKaWGi9-pvbM8J0OIelQtwtyYaJz7MLxFXf8oviG2Ex6r5_yDaP27Y_6UdfJlcrvOymwDM0FUDx5r_rWepdYbSfx6Dh22Ux4GFHOvWAhQ0gISaA5wyc8O29mtSWspNhioMjkrgzCx6"/>
<div class="absolute bottom-2 right-2 bg-black/60 backdrop-blur px-1.5 py-0.5 rounded text-[10px] font-bold">4.2s</div>
</div>
<span class="text-[10px] font-medium text-on-surface-variant uppercase tracking-wider px-1">Scene 4</span>
</div>
<!-- Scene 5 -->
<div class="flex-shrink-0 w-32 group cursor-pointer">
<div class="h-24 rounded-xl bg-surface-container-low overflow-hidden border border-white/5 group-hover:border-primary/50 transition-all mb-2 relative">
<div class="w-full h-full flex items-center justify-center bg-surface-variant/40">
<span class="material-symbols-outlined text-white/20" data-icon="add">add</span>
</div>
</div>
<span class="text-[10px] font-medium text-on-surface-variant uppercase tracking-wider px-1">Add Scene</span>
</div>
</div>
</section>
<!-- AI Prompt Bar -->
<section class="fixed bottom-24 left-0 w-full px-4 md:px-8 z-50">
<div class="max-w-4xl mx-auto">
<div class="bg-[#262626]/60 backdrop-blur-[24px] border border-white/10 rounded-2xl p-2 flex items-center gap-4 shadow-2xl">
<div class="w-10 h-10 rounded-xl bg-gradient-to-br from-[#b6a0ff] to-[#7e51ff] flex items-center justify-center text-white shrink-0">
<span class="material-symbols-outlined" data-icon="auto_awesome" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
</div>
<div class="flex-grow">
<input class="w-full bg-transparent border-none focus:ring-0 text-on-surface placeholder-on-surface-variant font-body text-sm" placeholder='Try: "Cut this scene 1s shorter" or "Add a cinematic filter"' type="text"/>
</div>
<button class="bg-primary text-on-primary px-4 py-2 rounded-xl font-bold text-xs uppercase tracking-widest hover:bg-primary-fixed-dim transition-colors shrink-0">
                        Refine
                    </button>
</div>
</div>
</section>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-8 pb-8 bg-[#262626]/60 backdrop-blur-[24px] rounded-t-[1.5rem] border border-white/10 shadow-[0_20px_40px_rgba(0,0,0,0.15)] mx-4 mb-6">
<button class="flex flex-col items-center justify-center bg-gradient-to-br from-[#b6a0ff] to-[#7e51ff] text-white rounded-xl p-3 active:scale-95 duration-200">
<span class="material-symbols-outlined" data-icon="movie_edit" style="font-variation-settings: 'FILL' 1;">movie_edit</span>
</button>
<button class="flex flex-col items-center justify-center text-[#adaaaa] p-3 hover:bg-white/5 transition-all active:scale-95 duration-200">
<span class="material-symbols-outlined" data-icon="auto_awesome">auto_awesome</span>
</button>
<button class="flex flex-col items-center justify-center text-[#adaaaa] p-3 hover:bg-white/5 transition-all active:scale-95 duration-200">
<span class="material-symbols-outlined" data-icon="layers">layers</span>
</button>
<button class="flex flex-col items-center justify-center text-[#adaaaa] p-3 hover:bg-white/5 transition-all active:scale-95 duration-200">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</button>
</nav>
